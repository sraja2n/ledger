<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-from: #0d1b2a;
    --bg-to: #1b2a3b;
    --card: #162032;
    --card-header: #0f1e2e;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.14);
    --gold: #e2b96e;
    --gold-dim: rgba(226,185,110,0.15);
    --gold-glow: rgba(226,185,110,0.08);
    --text: #e8edf2;
    --text-muted: #6b849d;
    --positive: #3dd68c;
    --positive-bg: rgba(61,214,140,0.1);
    --negative: #f26c6c;
    --negative-bg: rgba(242,108,108,0.1);
    --hover: rgba(226,185,110,0.05);
    --add-bg: rgba(255,255,255,0.03);
    --shadow: 0 24px 64px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.3);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px 48px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .ledger {
    background: var(--card);
    width: 100%;
    max-width: 780px;
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    position: relative;
    z-index: 1;
    border: 1px solid var(--border-strong);
  }

  .ledger::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, var(--gold) 30%, var(--gold) 70%, transparent 100%);
    z-index: 2;
  }

  /* ── HEADER ── */
  header {
    padding: 24px 24px 20px;
    background: var(--card-header);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-icon {
    width: 40px;
    height: 40px;
    background: var(--gold-dim);
    border: 1px solid rgba(226,185,110,0.3);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1.35rem;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  header p {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
    font-weight: 400;
  }

  .btn-reset {
    background: rgba(242,108,108,0.1);
    border: 1px solid rgba(242,108,108,0.25);
    color: var(--negative);
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    min-height: 36px;
  }
  .btn-reset:hover, .btn-reset:active {
    background: rgba(242,108,108,0.22);
    border-color: rgba(242,108,108,0.5);
  }

  /* ── ADD FORM ── */
  .add-section {
    border-bottom: 1px solid var(--border);
    background: var(--add-bg);
  }

  .add-row {
    display: grid;
    grid-template-columns: 155px 1fr 130px 52px;
  }

  .add-row input {
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    padding: 14px;
    color: var(--text);
    outline: none;
    width: 100%;
    transition: background 0.15s;
    min-height: 52px;
  }
  .add-row input::placeholder { color: var(--text-muted); }
  .add-row input:focus { background: var(--gold-glow); }

  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.5) sepia(1) saturate(2) hue-rotate(5deg);
    opacity: 0.5;
    cursor: pointer;
  }

  .btn-add {
    background: var(--gold);
    border: none;
    color: #0d1b2a;
    font-size: 1.5rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    min-height: 52px;
  }
  .btn-add:hover { background: #f0cc88; }
  .btn-add:active { transform: scale(0.95); }

  /* ── TABLE ── */
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    min-width: 400px;
  }

  thead tr {
    border-bottom: 1px solid var(--border-strong);
    background: rgba(255,255,255,0.02);
  }

  th {
    font-size: 0.6rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
  }
  th:first-child { width: 115px; }
  th:last-child  { width: 46px; text-align: center; }
  th.amount      { text-align: right; width: 130px; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
    animation: fadeIn 0.22s ease;
  }
  tbody tr:hover { background: var(--hover); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  td {
    font-size: 0.82rem;
    padding: 12px 14px;
    color: var(--text);
    vertical-align: middle;
    word-break: break-word;
  }

  .date-cell {
    color: var(--text-muted);
    font-size: 0.75rem;
    white-space: nowrap;
  }

  td.amount { text-align: right; }

  .amount-pill {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .amount-pill.positive { background: var(--positive-bg); color: var(--positive); }
  .amount-pill.negative { background: var(--negative-bg); color: var(--negative); }

  td.delete { text-align: center; }

  .btn-delete {
    background: none;
    border: 1px solid transparent;
    color: var(--text-muted);
    font-size: 0.82rem;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 6px;
    transition: all 0.15s;
    opacity: 0.35;
    min-width: 32px;
    min-height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  tbody tr:hover .btn-delete { opacity: 1; }
  .btn-delete:hover, .btn-delete:active {
    color: var(--negative);
    background: var(--negative-bg);
    border-color: rgba(242,108,108,0.3);
    opacity: 1;
  }

  .empty-row td {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.78rem;
    padding: 44px 16px;
    font-style: italic;
    opacity: 0.6;
  }

  /* ── TOTAL ── */
  tfoot tr {
    border-top: 1px solid var(--border-strong);
    background: var(--card-header);
  }
  tfoot td { padding: 14px 14px; font-size: 0.82rem; }
  tfoot td:first-child {
    font-size: 0.6rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
  }
  tfoot td.total-amount {
    text-align: right;
    font-weight: 700;
    font-size: 1rem;
  }
  tfoot td.total-amount.positive { color: var(--positive); }
  tfoot td.total-amount.negative { color: var(--negative); }
  tfoot td.total-amount.zero     { color: var(--gold); }

  .row-num {
    display: inline-block;
    width: 18px;
    font-size: 0.58rem;
    color: var(--text-muted);
    opacity: 0.35;
    margin-right: 3px;
    text-align: right;
  }

  /* ════════════════════════════════
     TABLET  ≤ 640px
  ════════════════════════════════ */
  @media (max-width: 640px) {
    body { padding: 16px 12px 48px; }

    .ledger { border-radius: 12px; }

    /* Stacked form: row 1 = date | amount, row 2 = item | add-btn */
    .add-row {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
    }
    .add-row #inp-date   { grid-column: 1; grid-row: 1; border-bottom: 1px solid var(--border); }
    .add-row #inp-amount { grid-column: 2; grid-row: 1; border-right: none; border-bottom: 1px solid var(--border); }
    .add-row #inp-item   { grid-column: 1; grid-row: 2; border-right: 1px solid var(--border); }
    .add-row .btn-add    { grid-column: 2; grid-row: 2; }

    .add-row input { padding: 12px; font-size: 0.88rem; min-height: 50px; }
  }

  /* ════════════════════════════════
     MOBILE  ≤ 420px
  ════════════════════════════════ */
  @media (max-width: 420px) {
    body { padding: 0 0 40px; }

    .ledger { border-radius: 0; border-left: none; border-right: none; }

    header { padding: 16px; }
    header h1 { font-size: 1.1rem; }
    header p  { display: none; }

    table { min-width: 0; table-layout: auto; }
    th, td { padding: 10px 10px; font-size: 0.76rem; }
    th:first-child { width: auto; }
    th.amount { width: 95px; }
    th:last-child { width: 38px; }

    .amount-pill { padding: 2px 7px; font-size: 0.68rem; }
    .date-cell   { font-size: 0.68rem; }
    .row-num     { display: none; }

    tfoot td { padding: 12px 10px; }
    tfoot td.total-amount { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<div class="ledger">
  <header>
    <div class="header-left">
      <div class="header-icon">📒</div>
      <div>
        <h1>Ledger</h1>
        <p>Track your entries</p>
      </div>
    </div>
    <button class="btn-reset" onclick="resetAll()">↺ Reset All</button>
  </header>

  <div class="add-section">
    <div class="add-row">
      <input type="date"   id="inp-date">
      <input type="text"   id="inp-item"   placeholder="Item description…" autocomplete="off">
      <input type="number" id="inp-amount" placeholder="Amount" step="0.01" inputmode="decimal">
      <button class="btn-add" onclick="addRow()" title="Add row">+</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Item</th>
          <th class="amount">Amount</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr class="empty-row">
          <td colspan="4">No entries yet — add one above</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td>Total</td>
          <td></td>
          <td class="total-amount zero" id="total">0.00</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<script>
  let rows = [];

  document.getElementById('inp-date').valueAsDate = new Date();

  // Enter key navigation
  document.getElementById('inp-date').addEventListener('keydown',   e => { if (e.key === 'Enter') document.getElementById('inp-item').focus(); });
  document.getElementById('inp-item').addEventListener('keydown',   e => { if (e.key === 'Enter') document.getElementById('inp-amount').focus(); });
  document.getElementById('inp-amount').addEventListener('keydown', e => { if (e.key === 'Enter') addRow(); });

  function addRow() {
    const date      = document.getElementById('inp-date').value;
    const item      = document.getElementById('inp-item').value.trim();
    const amountStr = document.getElementById('inp-amount').value;

    if (!date || !item || amountStr === '') {
      flash('inp-date',   !date);
      flash('inp-item',   !item);
      flash('inp-amount', amountStr === '');
      return;
    }

    rows.push({ id: Date.now(), date, item, amount: parseFloat(amountStr) });
    document.getElementById('inp-item').value   = '';
    document.getElementById('inp-amount').value = '';
    document.getElementById('inp-date').valueAsDate = new Date();
    render();
    document.getElementById('inp-item').focus();
  }

  function flash(id, condition) {
    if (!condition) return;
    const el = document.getElementById(id);
    el.style.background = 'rgba(242,108,108,0.14)';
    setTimeout(() => el.style.background = '', 700);
  }

  function deleteRow(id) {
    rows = rows.filter(r => r.id !== id);
    render();
  }

  function resetAll() {
    if (!rows.length) return;
    if (confirm('Reset all entries?')) { rows = []; render(); }
  }

  function formatDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function formatAmount(n) {
    return (n >= 0 ? '+' : '') + n.toFixed(2);
  }

  function render() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    if (!rows.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="4">No entries yet — add one above</td></tr>';
    } else {
      rows.forEach((r, i) => {
        const cls = r.amount >= 0 ? 'positive' : 'negative';
        const tr  = document.createElement('tr');
        tr.innerHTML = `
          <td class="date-cell"><span class="row-num">${i+1}</span>${formatDate(r.date)}</td>
          <td>${esc(r.item)}</td>
          <td class="amount"><span class="amount-pill ${cls}">${formatAmount(r.amount)}</span></td>
          <td class="delete"><button class="btn-delete" title="Delete" onclick="deleteRow(${r.id})">✕</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    const total   = rows.reduce((s, r) => s + r.amount, 0);
    const totalEl = document.getElementById('total');
    totalEl.textContent = (total >= 0 ? '+' : '') + total.toFixed(2);
    totalEl.className   = 'total-amount ' + (total > 0 ? 'positive' : total < 0 ? 'negative' : 'zero');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
